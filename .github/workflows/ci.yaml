name: CI
on:
  push:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.json'
      - '**.yaml'

jobs:
  # Lint and TypeScript checks
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install modules
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm lint .
      - name: Run TypeScript Checks
        run: pnpm type-check

  # Cypress Integration tests
  cypress-run:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install-command: pnpm install --frozen-lockfile
          browser: chrome
          start: pnpm start
          wait-on: http://localhost:3000
